name: Secrets Secondary Scan

on:
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail workflow on verified findings"
        required: false
        default: false
        type: boolean
      open_issue:
        description: "Open/update a tracking issue when findings exist"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "20 2 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: secrets-secondary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog-verified:
    name: TruffleHog Verified Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install trufflehog
        shell: bash
        run: |
          set -euo pipefail
          version="3.93.6"
          arch="$(uname -m)"
          expected_sha256=""
          case "$arch" in
            x86_64)
              arch="amd64"
              expected_sha256="d599c5405d9f92979a239ba36d1f210e9f7e023db9f75cad9fddc029d6ba2748"
              ;;
            aarch64|arm64)
              arch="arm64"
              expected_sha256="631c70f50c1df6f709efcd2779c5546fd7bbd54e27b74eb08dcb588c78a854fe"
              ;;
            *)
              echo "unsupported arch: $arch" >&2
              exit 1
              ;;
          esac
          tarball="trufflehog_${version}_linux_${arch}.tar.gz"
          url="https://github.com/trufflesecurity/trufflehog/releases/download/v${version}/${tarball}"
          curl -sSL "$url" -o "$tarball"
          echo "${expected_sha256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" trufflehog
          install -m 0755 trufflehog /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run trufflehog verified scan (warning only)
        id: scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trufflehog git file://. \
            --json \
            --results=verified \
            --fail \
            --no-update \
            > trufflehog-verified.jsonl

      - name: Summarize and generate structured report
        id: summarize
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          count=0
          scan_outcome="${{ steps.scan.outcome }}"
          mode="warning-only"
          enforce_requested="false"
          enforced_failure="false"
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ vars.SECRETS_SECONDARY_ENFORCE_ON_MAIN }}" == "true" ]]; then
            mode="enforced-on-main"
            enforce_requested="true"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.enforce }}" == "true" ]]; then
            mode="manual-enforced"
            enforce_requested="true"
          fi
          if [[ -f trufflehog-verified.jsonl ]]; then
            count="$(grep -c '\"DetectorType\"' trufflehog-verified.jsonl || true)"
          fi
          if [[ "$scan_outcome" == "failure" && "$enforce_requested" == "true" ]]; then
            enforced_failure="true"
          fi
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > secrets-secondary-summary.json <<JSON
          {
            "generated_at": "${generated_at}",
            "run": {
              "id": "${{ github.run_id }}",
              "attempt": "${{ github.run_attempt }}",
              "event": "${{ github.event_name }}",
              "ref": "${{ github.ref }}"
            },
            "mode": "${mode}",
            "scan_outcome": "${scan_outcome}",
            "findings_verified_approx": ${count},
            "enforce_requested": ${enforce_requested},
            "enforced_failure": ${enforced_failure}
          }
          JSON

          {
            echo "### TruffleHog Secondary Scan"
            echo "- mode: ${mode}"
            echo "- scan step outcome: ${scan_outcome}"
            echo "- verified findings (approx): ${count}"
            echo "- enforce requested: ${enforce_requested}"
            echo "- enforced failure: ${enforced_failure}"
            echo "- structured summary: secrets-secondary-summary.json"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo "findings_count=${count}"
            echo "mode=${mode}"
            echo "scan_outcome=${scan_outcome}"
            echo "enforce_requested=${enforce_requested}"
            echo "enforced_failure=${enforced_failure}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload trufflehog artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trufflehog-verified-report
          path: |
            trufflehog-verified.jsonl
            secrets-secondary-summary.json
          if-no-files-found: warn
          retention-days: 14

      - name: Open or update findings issue (optional)
        if: ${{ steps.summarize.outputs.findings_count != '0' && ((vars.SECRETS_SECONDARY_OPEN_ISSUE_ON_FINDINGS == 'true') || (github.event_name == 'workflow_dispatch' && (inputs.open_issue == true || inputs.open_issue == 'true'))) }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const findingsCount = Number(`${{ steps.summarize.outputs.findings_count }}` || "0");
            const mode = `${{ steps.summarize.outputs.mode }}`;
            const scanOutcome = `${{ steps.summarize.outputs.scan_outcome }}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[secrets-secondary] verified findings detected";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Automated alert from `secrets-secondary` workflow.",
              "",
              `- findings_verified_approx: ${findingsCount}`,
              `- mode: ${mode}`,
              `- scan_outcome: ${scanOutcome}`,
              `- run: ${runUrl}`,
              "",
              "Please follow `docs/ops-runbook-secrets.md` for triage and remediation."
            ].join("\n");

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
              per_page: 1
            });
            const existing = search.data.items?.[0];

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.info(`updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              core.info(`created issue #${created.data.number}`);
            }

      - name: Enforce findings policy
        if: ${{ steps.scan.outcome == 'failure' && ((github.ref == 'refs/heads/main' && vars.SECRETS_SECONDARY_ENFORCE_ON_MAIN == 'true') || (github.event_name == 'workflow_dispatch' && (inputs.enforce == true || inputs.enforce == 'true'))) }}
        shell: bash
        run: |
          set -euo pipefail
          echo "verified secrets findings detected and policy requires failure" >&2
          exit 1
