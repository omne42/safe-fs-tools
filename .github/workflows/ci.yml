name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.24.2"
          arch="$(uname -m)"
          expected_sha256=""
          case "$arch" in
            x86_64)
              arch="x64"
              expected_sha256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
              ;;
            aarch64|arm64)
              arch="arm64"
              expected_sha256="574a6d52573c61173add7ddb5e3cc68c0e82cb0735818a1eeb9a0a2de1643fbc"
              ;;
            *)
              echo "unsupported arch: $arch" >&2
              exit 1
              ;;
          esac
          tarball="gitleaks_${version}_linux_${arch}.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${tarball}"
          curl -sSL "$url" -o "$tarball"
          echo "${expected_sha256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run gitleaks
        shell: bash
        run: |
          set -euo pipefail
          baseline_path="security/secrets/gitleaks-baseline.json"
          cmd=(
            gitleaks
            dir
            .
            --redact
            --no-banner
            --log-level warn
            --exit-code 1
            --report-format sarif
            --report-path gitleaks.sarif
          )
          if [[ -f "$baseline_path" ]]; then
            cmd+=(--baseline-path "$baseline_path")
          fi
          "${cmd[@]}"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt,clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2

      - name: Gates
        shell: bash
        run: ./scripts/gate.sh
